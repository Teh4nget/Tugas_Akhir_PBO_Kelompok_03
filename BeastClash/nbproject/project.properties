annotation.processing.enabled=true
annotation.processing.enabled.in.editor=false
annotation.processing.processors.list=
annotation.processing.run.all.processors=true
annotation.processing.source.output=${build.generated.sources.dir}/ap-source-output
application.title=BeastClash
application.vendor=BeastClashTeam
build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
clean.on.disable.modules=false
compile.on.save=auto
debug.classpath=\
    ${run.classpath}
debug.test.classpath=\
    ${run.test.classpath}
debug.modulepath=\
    ${run.modulepath}
debug.test.modulepath=\
    ${run.test.modulepath}
dist.dir=dist
dist.jar=${dist.dir}/BeastClash.jar
dist.javadoc.dir=${dist.dir}/javadoc
endorsed.classpath=
excludes=
# ── JDBC Driver ──────────────────────────────────────────────────────────────
# Letakkan file mysql-connector-j-*.jar di dalam folder 'lib' di root project.
# Contoh: BeastClash/lib/mysql-connector-j-9.5.0.jar
# Path ini menggunakan path RELATIF sehingga portabel di semua komputer.
file.reference.mysql-connector-j.jar=lib/mysql-connector-j-9.5.0.jar
includes=**
jar.compress=false
# Classpath menyertakan driver MySQL dari folder lib (relatif)
javac.classpath=\
    ${file.reference.mysql-connector-j.jar}
javac.deprecation=false
javac.external.vm=false
javac.modulepath=
javac.processormodulepath=
javac.processorpath=\
    ${javac.classpath}
# FIX: source & target diubah ke 11 (kompatibel JDK 11–26, aman di NetBeans+JDK 26)
# JDK 26 mendukung --release 11 sehingga kode tetap berjalan.
# Jika ingin fitur bahasa Java terbaru, ganti ke 21 atau 26.
javac.source=11
javac.target=11
javac.test.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
javac.test.modulepath=\
    ${javac.modulepath}
javac.test.processorpath=\
    ${javac.test.classpath}
javadoc.author=false
javadoc.html5=false
javadoc.noindex=false
javadoc.nonavbar=false
javadoc.notree=false
javadoc.private=false
javadoc.splitindex=false
javadoc.use=false
javadoc.version=false
jlink.launcher=false
jlink.launcher.name=BeastClash
main.class=beastclash.view.MainFrame
manifest.file=manifest.mf
meta.inf.exclusions=/
mkdist.disabled=false
platform.active=default_platform
run.classpath=\
    ${javac.classpath}:\
    ${build.classes.dir}
run.modulepath=\
    ${javac.modulepath}
run.test.classpath=\
    ${javac.test.classpath}:\
    ${build.test.classes.dir}
run.test.modulepath=\
    ${javac.test.modulepath}
source.encoding=UTF-8
src.dir=src
test.src.dir=test
